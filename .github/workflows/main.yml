# Based on the workflows of:
# https://github.com/League-of-Foundry-Developers/FoundryVTT-Module-Template and
# https://github.com/pwatson100/alienrpg
name: Release Creation

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      # system.json's "version" field should be a clean semver-ish string
      # (Foundry doesn't expect a leading "v"), even if the git tag itself
      # uses one (e.g. tag "v1.2.3" -> version "1.2.3"). The download/manifest
      # URLs below still use the raw tag_name, since that's what GitHub
      # actually names the release assets after.
      - name: Compute clean version string (strip leading v from tag)
        id: version
        run: echo "value=$(echo '${{ github.event.release.tag_name }}' | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      # Substitute the Manifest and Download URLs in the system.json
      - name: Substitute Manifest and Download Links For Versioned Ones
        id: sub_manifest_link_version
        uses: microsoft/variable-substitution@v1
        with:
          files: "system.json"
        env:
          version: ${{ steps.version.outputs.value }}
          manifest: https://github.com/${{github.repository}}/releases/latest/download/system.json
          download: https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/system.zip

      # Create a zip file with all files required by the system to add to the release
      - run: zip -r ./system.zip "Terms of Use and License.pdf" README.md LICENSE.TXT README.md system.json template.json css/ fonts/ lang/ module/ packs/ templates/ tokens/

      # Create a release for this specific version
      - name: Update Release with Files
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true # Set this to false if you want to prevent updating existing releases
          name: ${{ github.event.release.name }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./system.json, ./system.zip"
          tag: ${{ github.event.release.tag_name }}
          body: ${{ github.event.release.body }}
